{% extends 'Owner_Dash.html' %}
{% block content %}

<h3 class="mb-4">Edit Turf</h3>

<div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
        Turf Details
    </div>
    <div class="card-body">

        <form method="post" action="{% url 'update_turf' t_id=turf.id %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-3">

                <div class="col-lg-6">
                    <label class="form-label">Turf Name</label>
                    <input type="text" name="Turf_name" class="form-control" value="{{turf.Turf_name}}" required>
                </div>

                <div class="col-lg-6">
                    <label class="form-label">Sport</label>
                    <select name="Sport" class="form-select" required>
                        <option>{{turf.Sport}}</option>
                        {% for i in item %}
                        <option>{{i.Sport_name}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-lg-6">
                    <label class="form-label">Owner</label>
                    <input type="text" name="Owner" value="{{request.session.username}}" class="form-control" required readonly>
                </div>

                <div class="col-lg-6">
                    <label class="form-label">City</label>
                    <select name="City" class="form-select" required>
                        <option>{{turf.City}}</option>
                        {% for i in data %}
                        <option>{{i.Cityname}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Location</label>
                    <input type="text" name="Location" class="form-control" value="{{turf.Location}}" required>
                </div>

                <div class="col-lg-6">
                    <label class="form-label">Price Per Hour (₹)</label>
                    <input type="number" min="1" name="Price_per_hour" class="form-control" value="{{turf.Price_per_hour}}" required>
                </div>

                <div class="col-lg-6">
                    <label class="form-label">Size</label>
                    <select name="Size" class="form-select" required>
                        <option>{{turf.Size}}</option>
                        <option value="5v5">5v5</option>
                        <option value="7v7">7v7</option>
                        <option value="9v9">9v9</option>
                        <option value="Full Ground">Full Ground</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="Description" class="form-control" rows="4" required>{{turf.Description}}</textarea>
                </div>

                <!-- Turf Images Aligned -->
                <div class="col-lg-6">
                    <label class="form-label">Turf Image 1</label>
                    <div class="mb-2">
                        <img src="{{turf.Turf_image1.url}}" width="200px" class="img-fluid rounded shadow-sm" alt="Turf Image 1">
                    </div>
                    <input type="file" name="Turf_image1" class="form-control">
                </div>

                <div class="col-lg-6">
                    <label class="form-label">Turf Image 2</label>
                    <div class="mb-2">
                        <img src="{{turf.Turf_image2.url}}" width="200px" class="img-fluid rounded shadow-sm" alt="Turf Image 2">
                    </div>
                    <input type="file" name="Turf_image2" class="form-control">
                </div>

            </div>

            <div class="mt-4 text-end">
                <button type="submit" class="btn btn-success px-4">
                    Update Turf
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
