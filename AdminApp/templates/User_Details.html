{% extends 'Dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <section class="table-section">
  <h2>Sports List</h2>

  <table class="sport-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Username</th>
        <th>Role</th>
        <th>Phone Number</th>
        <th>Password</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
    {% for i in item %}
      <tr>
        <td>{{i.id}}</td>
        <td>{{i.username}}</td>
        <td>{{i.role}}</td>
        <td>{{i.phone_number}}</td>
        <td>{{i.password}}</td>
        <td class="actions">
          <a href="{% url 'edit_user' user_id=i.id %}"><button class="btn-edit">Edit</button></a>
          <a href="#"><button class="btn-delete">Delete</button></a>
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</section>
</body>
</html>
{% endblock %}
