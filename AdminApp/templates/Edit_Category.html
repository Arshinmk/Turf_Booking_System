<!DOCTYPE html>
{% extends 'Dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Sport</title>

    <style>
    /* Image Upload Grid */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    /* Each Image + Input Pair */
    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Image Preview Style */
    .sport-preview {
      width: 140px;
      height: 90px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }
    </style>

</head>

<body>

<section class="form-section">

  <h2>Edit Sport Details</h2>
  <p class="subtitle">Edit sport details and upload images</p>

  <form class="sport-form"
        method="post"
        action="{% url 'update_category' category_id=arg.id %}"
        enctype="multipart/form-data">

    {% csrf_token %}

    <!-- Sport Name -->
    <div class="form-group">
      <label for="sport_name">Sport Name</label>
      <input
        type="text"
        id="sport_name"
        name="sport_name"
        value="{{arg.Sport_name}}"
        required
      />
    </div>

    <!-- Sport Description -->
    <div class="form-group">
      <label for="sport_description">Sport Description</label>
      <textarea
        id="sport_description"
        name="sport_description"
        rows="4"
        required
      >{{arg.Sport_description}}</textarea>
    </div>

    <!-- Image Uploads -->
    <div class="form-group">
      <label>Sport Images</label>

      <div class="file-grid">

        <!-- Image 1 -->
        <div class="file-item">
          <img src="{{arg.Sport_img1.url}}" class="sport-preview">
          <input type="file" name="sport_img1">
        </div>

        <!-- Image 2 -->
        <div class="file-item">
          <img src="{{arg.Sport_img2.url}}" class="sport-preview">
          <input type="file" name="sport_img2">
        </div>

      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn">Save Sport</button>

  </form>

</section>

</body>
</html>

{% endblock %}
